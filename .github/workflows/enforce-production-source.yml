name: Enforce production source branch

on:
  pull_request:
    branches: [production]

jobs:
  check-source:
    name: Source must be main
    runs-on: ubuntu-latest

    steps:
      - name: Reject if source is not main
        if: github.head_ref != 'main'
        run: |
          echo "Only main can be merged into production."
          echo "Source branch was: ${{ github.head_ref }}"
          exit 1

      - name: Confirm source is main
        if: github.head_ref == 'main'
        run: echo "Source branch is main — OK"
